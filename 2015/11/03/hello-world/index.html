    <title>Hexo快速入门</title>
</head>

<body>

<p>欢迎使用<a href="http://hexo.io/" target="_blank" rel="external">Hexo</a>! 这是第一篇文章，检查<a href="http://hexo.io/docs/" target="_blank" rel="external">文档</a>获取更多信息。如果对Hexo有任何问题，请查看<a href="https://github.com/hexojs/hexo/issues" target="_blank" rel="external">疑问</a>.你也可以到<a href="https://github.com/hexojs/hexo/issues" target="_blank" rel="external">Github</a>咨询我.</p>
<h2 id="快速入门">快速入门</h2><h3 id="创建新文章">创建新文章</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ hexo new <span class="string">"My New Post"</span></span><br></pre></td></tr></table></figure>
<p>更多信息: <a href="http://hexo.io/docs/writing.html" target="_blank" rel="external">写作</a></p>
<h3 id="运行服务器">运行服务器</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ hexo server</span><br></pre></td></tr></table></figure>
<p>更多信息: <a href="http://hexo.io/docs/server.html" target="_blank" rel="external">服务器</a></p>
<h3 id="生成静态文件">生成静态文件</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ hexo generate</span><br></pre></td></tr></table></figure>
<p>更多信息: <a href="http://hexo.io/docs/generating.html" target="_blank" rel="external">生成</a></p>
<h3 id="部署到远程服务器">部署到远程服务器</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ hexo deploy</span><br></pre></td></tr></table></figure>
<p>更多信息: <a href="http://hexo.io/docs/deployment.html" target="_blank" rel="external">部署</a></p>
